app = "atelier-control-plane"  # "atelier-api" is taken globally on Fly
primary_region = "sjc"  # sea is deprecated on Fly as of mid-2026

[build]
  dockerfile = "../apps/api/Dockerfile"

[mounts]
  source = "atelier_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
