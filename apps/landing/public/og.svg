  <!-- tagline -->
  <text x="112" y="420" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="400" fill="#828384">Chat-first agentic coding in your browser</text>
