      <stop offset="0%" stop-color="rgba(175,80,255,0.25)" />
      <stop offset="100%" stop-color="rgba(175,80,255,0)" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#090909" />
  <rect width="1200" height="630" fill="url(#bloom)" />

