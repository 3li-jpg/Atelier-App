<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1713" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Atelier — agentic coding from any browser against your own model endpoints. Open-source, BYOK, mobile-first."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atelier" />
    <title>Atelier — agentic coding in your browser</title>

    <!-- Preconnect + load the same fonts as the landing page for visual consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Initial loading state ──────────────────────────────────────
         Shown immediately on first paint, before React mounts.
         Visually matches the landing page's TransitionOverlay so the
         cross-origin redirect feels seamless: same near-black background,
         violet radial bloom, Atelier wordmark, violet spinner, and mono
         status text. Once React mounts, #root replaces this content and
         the loading state is gone. */

      #atelier-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1713;
        overflow: hidden;
      }

      #atelier-boot .bloom {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 45%,
          rgba(139, 69, 230, 0.12),
          transparent 55%
        );
        pointer-events: none;
      }

      #atelier-boot .content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      #atelier-boot .wordmark {
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 28px;
        letter-spacing: -0.3px;
        color: #d8cfc4;
      }

      #atelier-boot .spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8b45e6;
      }

      #atelier-boot .spinner svg {
        width: 28px;
        height: 28px;
        animation: atelier-boot-spin 0.7s linear infinite;
      }

      @keyframes atelier-boot-spin {
        to { transform: rotate(360deg); }
      }

      #atelier-boot .message {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #a99e90;
        margin: 0;
      }

      /* Fade out the boot screen once React is ready.
         main.tsx adds the .boot-done class to <html> right before
         calling createRoot().render(). */
      .boot-done #atelier-boot {
        animation: atelier-boot-fade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes atelier-boot-fade {
        to { opacity: 0; visibility: hidden; }
      }

      @media (prefers-reduced-motion: reduce) {
        #atelier-boot .spinner svg { animation-duration: 1.5s; }
        .boot-done #atelier-boot { animation-duration: 0.01s; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Boot loading state — replaced when React mounts -->
      <div id="atelier-boot">
        <div class="bloom"></div>
        <div class="content">
          <div class="wordmark">Atelier</div>
          <div class="spinner">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-opacity="0.2" />
              <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <p class="message">Loading workspace…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
